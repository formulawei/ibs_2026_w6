<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IBS W6｜Execution &amp; Dynamic Capabilities</title>
<style>
/* ════════════════════════════════════════════
   NTU W6 palette — Execution & Dynamic Cap
   ════════════════════════════════════════════ */
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --s0:#1A6B4A; --t1:#6B21A8; --t2:#1A4A8B;
  --t3:#B45309; --c1:#9A3412; --s1:#0E7490;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:17px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn:active{transform:translateY(1px);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;
  max-width:1480px;margin:0 auto;}
/* ── Sidebar ── */
.sidebar{position:sticky;top:86px;align-self:start;
  border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;
  border:1px solid transparent;background:transparent;cursor:pointer;
  font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(26,107,74,.10);border-color:rgba(26,107,74,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(107,33,168,.10);border-color:rgba(107,33,168,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(26,74,139,.10);border-color:rgba(26,74,139,.25);color:var(--t2);}
.navItem.seg-t3.active{background:rgba(180,83,9,.10);border-color:rgba(180,83,9,.25);color:var(--t3);}
.navItem.seg-c1.active{background:rgba(154,52,18,.10);border-color:rgba(154,52,18,.25);color:var(--c1);}
.navItem.seg-s1.active{background:rgba(14,116,144,.10);border-color:rgba(14,116,144,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;
  border:1px solid var(--line);border-radius:7px;background:#fff;
  color:var(--muted);font-size:10px;}

/* ── Content ── */
.content{border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;
  gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(0,43,92,.25);background:rgba(0,43,92,.08);
  color:var(--ntu);padding:8px 14px;border-radius:999px;
  font-weight:800;white-space:nowrap;font-size:13px;}

/* time tracker */
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.t3{background:var(--t3);color:#fff;border-color:var(--t3);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1 !important;}

/* ── Cards / Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.card{border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}

/* ── Callout ── */
.callout{border-left:5px solid var(--ntu);padding:12px 14px;
  background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.orange{border-color:var(--t3);background:rgba(180,83,9,.06);}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.orange strong{color:#92400E;}

/* ── Pill row ── */
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 11px;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);}
.dot.g{background:#15803d;}
.dot.p{background:#7C3AED;}
.dot.r{background:#DC2626;}
.dot.o{background:#EA580C;}
.dot.t{background:#0E7490;}

/* ── Poll / Quiz ── */
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);
  border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;
  cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;
  font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);
  overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));
  transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}

/* ── Sliders ── */
.sliderRow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0;}
input[type=range]{width:min(340px,100%);accent-color:var(--ntu);cursor:pointer;}
.valBadge{font-family:var(--mono);font-weight:800;padding:5px 10px;
  border:1px solid var(--line);border-radius:10px;background:#fff;
  font-size:14px;color:var(--ntu);}

/* ── Drag-drop fill-in ── */
.dflex{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.dchip{border:1.5px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 12px;cursor:grab;font-weight:700;font-size:13px;
  color:var(--ntu);user-select:none;transition:.1s ease;touch-action:none;}
.dchip:hover{border-color:rgba(0,43,92,.40);background:rgba(0,43,92,.05);}
.dchip.dragging{opacity:.45;box-shadow:0 8px 20px rgba(0,0,0,.15);}
.dropzone{display:inline-block;min-width:130px;min-height:32px;
  border-bottom:2.5px dashed rgba(0,43,92,.35);padding:2px 8px;
  border-radius:0;font-weight:700;color:var(--ntu);
  background:rgba(0,43,92,.04);cursor:pointer;vertical-align:middle;
  font-size:14px;transition:.1s ease;}
.dropzone.over{border-color:var(--ntu);background:rgba(0,43,92,.10);}
.dropzone.filled{border-style:solid;border-color:var(--ntu);background:rgba(0,43,92,.07);}
.dropzone.correct-fill{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.dropzone.wrong-fill{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.dfeedback{font-size:13px;font-weight:700;margin-top:8px;min-height:20px;color:var(--muted);}

/* ── Highlight box ── */
.highlight{border:1px solid rgba(0,43,92,.22);border-radius:12px;
  background:rgba(0,43,92,.04);padding:12px 14px;margin:10px 0;}
.highlightTitle{font-weight:900;color:var(--ntu);font-size:14px;margin-bottom:6px;}

/* ── Presenter mode ── */
.presenter .sidebar{display:none;}
.presenter .layout{grid-template-columns:1fr;}
.presenter .h1{font-size:32px;}
.presenter .p,.presenter .ul{font-size:17px;}
.presenter .card{padding:20px;}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--ntu);color:#fff;
  padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;
  opacity:0;transform:translateY(8px);transition:.2s ease;pointer-events:none;z-index:99;}
#toast.show{opacity:1;transform:translateY(0);}

/* ══ W6-specific: SSR Accordion ══ */
.ssrGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.ssrCard{border-radius:14px;border:2px solid transparent;cursor:pointer;
  transition:.15s ease;overflow:hidden;}
.ssrCard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.10);}
.ssrCard.open{border-color:currentColor;}
.ssrHead{padding:14px;display:flex;flex-direction:column;gap:4px;}
.ssrIcon{font-size:28px;margin-bottom:4px;}
.ssrLabel{font-weight:900;font-size:15px;}
.ssrSub{font-size:12px;opacity:.75;}
.ssrBody{display:none;padding:0 14px 14px;font-size:13px;line-height:1.6;}
.ssrCard.open .ssrBody{display:block;}
.ssrMicro{margin:8px 0 0;padding-left:16px;color:var(--ink);}
.ssrMicro li{margin-bottom:4px;}

/* ══ W6-specific: Choice Cascade Org Tree ══ */
.cascadeTree{margin:14px 0;}
.cascadeLevel{display:flex;flex-direction:column;align-items:center;margin-bottom:0;}
.cascadeBox{border:2px solid var(--line);border-radius:12px;background:#fff;
  padding:12px 16px;cursor:pointer;transition:.15s ease;text-align:center;
  width:min(380px,100%);position:relative;}
.cascadeBox:hover{border-color:rgba(0,43,92,.40);}
.cascadeBox.open{border-color:currentColor;background:rgba(0,43,92,.03);}
.cascadeName{font-weight:900;font-size:14px;}
.cascadeRole{font-size:11px;color:var(--muted);margin-top:2px;}
.cascadeDecision{display:none;margin-top:10px;padding-top:10px;
  border-top:1px dashed var(--line);font-size:13px;text-align:left;line-height:1.55;}
.cascadeBox.open .cascadeDecision{display:block;}
.cascadeArrow{width:2px;height:24px;background:var(--line);margin:0 auto;}

/* ══ W6-specific: 2×2 Tension Matrix ══ */
.matrixWrap{position:relative;aspect-ratio:1;max-width:420px;margin:14px auto;}
.matrixGrid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:2px;height:100%;border:2px solid var(--line);border-radius:12px;overflow:hidden;}
.matCell{padding:12px;display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;font-weight:800;font-size:12px;line-height:1.4;
  cursor:pointer;transition:.15s ease;position:relative;}
.matCell:hover{opacity:.85;}
.matCell.active{outline:2px solid var(--ntu);outline-offset:-2px;}
.matLabel-x{text-align:center;font-size:11px;font-weight:700;color:var(--muted);
  padding:4px 0;letter-spacing:.08em;text-transform:uppercase;}
.matLabel-y{writing-mode:vertical-lr;transform:rotate(180deg);
  font-size:11px;font-weight:700;color:var(--muted);
  padding:4px 0;letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;}
.matArrow{font-size:18px;margin-bottom:4px;}
.matTsukuda{position:absolute;width:20px;height:20px;border-radius:50%;
  background:var(--gold);border:3px solid var(--ntu);
  transform:translate(-50%,-50%);pointer-events:none;
  box-shadow:0 4px 12px rgba(0,43,92,.30);z-index:10;
  transition:.4s ease;}

/* ══ W6-specific: Scene Flipper ══ */
.sceneFlipper{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;margin:14px 0;}
.sceneNav{display:flex;border-bottom:1px solid var(--line);}
.sceneTab{flex:1;padding:10px 6px;font-weight:800;font-size:12px;cursor:pointer;
  text-align:center;color:var(--muted);transition:.1s ease;border-right:1px solid var(--line);}
.sceneTab:last-child{border-right:none;}
.sceneTab.active{background:var(--ntu);color:#fff;}
.sceneTab:hover:not(.active){background:rgba(0,43,92,.06);}
.sceneBody{padding:18px;}
.sceneFramework{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.sfBox{border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.55;}

/* ══ W6-specific: Classifier drag ══ */
.classifyWrap{margin:14px 0;}
.classifyRow{display:flex;gap:14px;flex-wrap:wrap;}
.classifyCol{flex:1;min-width:200px;border:2px dashed var(--line);
  border-radius:14px;padding:12px;min-height:140px;}
.classifyCol.over{border-color:var(--ntu);background:rgba(0,43,92,.04);}
.classifyColTitle{font-weight:900;font-size:13px;text-align:center;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.classifyChip{border:1.5px solid var(--line);background:#fff;border-radius:10px;
  padding:8px 10px;cursor:grab;font-weight:700;font-size:12px;
  color:var(--ink);user-select:none;transition:.1s ease;
  margin-bottom:6px;line-height:1.4;}
.classifyChip:hover{border-color:rgba(0,43,92,.40);}
.classifyChip.correct-chip{border-color:#15803d;background:rgba(21,128,61,.09);}
.classifyChip.wrong-chip{border-color:#DC2626;background:rgba(220,38,38,.06);}

/* ══ Student Worksheet ══ */
.wsCard{border:1px solid var(--line);border-radius:14px;padding:16px;
  margin-bottom:14px;background:#fff;}
.wsLabel{font-weight:900;color:var(--ntu);font-size:14px;margin-bottom:10px;}
.wsTextarea{width:100%;min-height:130px;border:1.5px solid var(--line);
  border-radius:12px;padding:12px;font-family:var(--sans);font-size:14px;
  line-height:1.6;resize:vertical;outline:none;color:var(--ink);}
.wsTextarea:focus{border-color:rgba(0,43,92,.50);}
.voteBtns{display:grid;gap:8px;}
.vBtn{border:1.5px solid var(--line);background:#fff;border-radius:12px;
  padding:10px 12px;cursor:pointer;text-align:left;font-size:13px;
  color:var(--ink);transition:.1s ease;font-weight:700;}
.vBtn:hover{border-color:rgba(0,43,92,.35);}
.vBtn.sel{border-color:var(--ntu);background:rgba(0,43,92,.07);color:var(--ntu);}

/* Responsive */
@media(max-width:880px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;max-height:none;}
  .grid2{grid-template-columns:1fr;}
  .grid3{grid-template-columns:1fr 1fr;}
  .ssrGrid{grid-template-columns:1fr;}
  .sceneFramework{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand">
    <div class="logo">NTU<br>IBS</div>
    <div class="brandText">
      <div class="course">IBS 2026 · International Business Strategy</div>
      <div class="topic">W6 · Execution &amp; Dynamic Capabilities</div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="btnLang">EN / 中</button>
    <button class="btn gold" id="btnStudent">📝 Worksheet</button>
    <button class="btn" id="btnPresenter">投影模式</button>
    <button class="btn" id="btnReset">↺ Reset</button>
    <button class="btn" id="btnHelp">?</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="navTitle">W6 Segments</div>
    <button class="navItem seg-s0" data-view="s0">🏠 S0 · 開場 · 8 min</button>
    <button class="navItem seg-t1" data-view="t1">⚖️ T1 · Martin: 執行陷阱 · 18 min</button>
    <button class="navItem seg-t2" data-view="t2">🔄 T2 · Teece: 動態能力 · 20 min</button>
    <button class="navItem seg-t3" data-view="t3">⚡ T3 · 品質↔彈性整合 · 14 min</button>
    <button class="navItem seg-c1" data-view="c1">📺 C1 · 劇情分析 Ep9-10 · 12 min</button>
    <button class="navItem seg-s1" data-view="s1">📝 S1 · 策略備忘錄 · 10 min</button>
    <hr class="sep"/>
    <button class="navItem" data-view="student">📋 Student Worksheet</button>
    <div class="navFooter">
      <div class="hint">⬅ ➡ 切換段落<br/><span class="kbd">L</span> 語言 <span class="kbd">P</span> 投影 <span class="kbd">R</span> 重置</div>
    </div>
  </nav>

  <!-- Content -->
  <main class="content" id="content"></main>
</div>

<div id="toast"></div>

<script>
const STORE = "ibs_w6_2026_v1";
const VIEW_ORDER = ["s0","t1","t2","t3","c1","s1","student"];

// ════ STATE ════
const DEF = { lang:"zh", presenter:false, view:"s0",
              polls:{}, sliders:{}, quizDone:{},
              sceneTab:0, cascadeOpen:{0:false,1:false,2:false,3:false}, ssrOpen:{},
              studentVoteA:null, studentVoteB:null, studentReply:"",
              matPos:{x:25, y:75},  // Quality Rigidity x, Flexibility y
              classifyDone:false };
let ST = load();

// ════ DOM ════
const content = document.getElementById("content");
const toast   = document.getElementById("toast");

function load(){ try{const s=localStorage.getItem(STORE);return s?{...DEF,...JSON.parse(s)}:{...DEF};}catch(e){return{...DEF};} }
function save(){ try{localStorage.setItem(STORE,JSON.stringify(ST));}catch(e){} }
function showToast(m){toast.textContent=m;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>toast.classList.remove("show"),2200);}

// ════ POLL helpers ════
function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,e:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0)+(p.e||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){
  const p=getPoll(key); const t=tot(p); const zh=ST.lang==="zh";
  const ttl=zh?title:title_en;
  const fup=zh?followup:followup_en;
  return `<div class="qBox">
    <p class="qTitle">📊 ${ttl}</p>
    <div class="options">
      ${opts.map(([k,lz,le])=>`<button class="opt${p.choice===k?' chosen':''}" data-poll="${key}" data-opt="${k}">${k.toUpperCase()}. ${zh?lz:le}</button>`).join("")}
    </div>
    ${t>0?`<div style="margin-top:10px;display:grid;gap:4px;">
      ${opts.map(([k,lz,le])=>`<div style="display:flex;align-items:center;gap:6px;">
        <span style="width:30px;font-weight:900;font-family:var(--mono);font-size:12px;">${pct(p,k)}%</span>
        <div class="bar"><div class="fill" style="width:${pct(p,k)}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${k.toUpperCase()}. ${zh?lz:le}</span>
      </div>`).join("")}
      <div class="barWrap"><span class="smallVote">${t} 票 / votes</span></div>
    </div>`:`<div class="barWrap"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="smallVote">${t} 票</span></div>`}
    ${fup&&fup.length?`<hr class="sep"/><p class="sm" style="font-weight:800;margin-bottom:6px;">💬 ${zh?"討論追問":"Discussion prompts"}</p>
    <ul class="ul" style="font-size:13px;margin-top:0;color:var(--muted);">${fup.map(q=>`<li>${q}</li>`).join("")}</ul>`:``}
  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){
  const zh=ST.lang==="zh"; const done=ST.quizDone[key];
  return `<div class="qBox">
    <p class="qTitle">🧠 ${zh?q:q_en}</p>
    <div class="options">
      ${opts.map(([lz,le],i)=>`<button class="opt${done===i+1?(i===ans?' correct':' wrong'):''}" data-quiz="${key}" data-idx="${i}" ${done?'disabled':''}>
        ${String.fromCharCode(65+i)}. ${zh?lz:le}
      </button>`).join("")}
    </div>
    ${done?`<div class="callout ${done-1===ans?'green':'red'}" style="margin-top:10px;">
      <p class="p" style="font-size:13px;">${done-1===ans?"✅":"❌"} ${zh?exp:exp_en}</p>
    </div>`:`<div class="barWrap"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="smallVote">${zh?"選一個選項":"Pick an option"}</span></div>`}
  </div>`;
}

function sliderRow({key,label,label_en,min,max,step,def,fmt}){
  const zh=ST.lang==="zh"; const val=ST.sliders[key]??def;
  return `<div class="sliderRow">
    <span style="font-weight:700;font-size:13px;min-width:80px;">${zh?label:label_en}</span>
    <input type="range" id="sl-${key}" min="${min}" max="${max}" step="${step}" value="${val}"/>
    <span class="valBadge" id="slv-${key}">${fmt?fmt(val):val}</span>
  </div>`;
}

function handleSl(key,val){
  ST.sliders[key]=val; save();
  const el=document.getElementById("slv-"+key);
  if(!el)return;
  const rows={
    sense:v=>["1–幾乎無","2–薄弱","3–尚可","4–強","5–卓越"][v-1]||v,
    seize:v=>["1–幾乎無","2–薄弱","3–尚可","4–強","5–卓越"][v-1]||v,
    reconfig:v=>["1–幾乎無","2–薄弱","3–尚可","4–強","5–卓越"][v-1]||v,
  };
  const fmt=rows[key]; if(fmt)el.textContent=fmt(val); else el.textContent=val;
}

      q_en:"Teece notes that the microfoundations of dynamic capabilities 'must be necessarily incomplete, inchoate, and somewhat opaque or their implementation must be rather difficult.' What does this imply for Tsukuda's competitive advantage?",

    <div class="dfeedback" id="classify-fb"></div>
  </div>`;

  return `
  <div class="sectionHead">
    <div>
      <h1 class="h1" style="color:var(--t3)">${zh?"T3｜整合：品質剛性 × 組織彈性——框架對話":"T3 | Integration: Quality Rigidity × Organizational Flexibility — Framework Dialogue"}</h1>
      <p class="sub">${zh?"Martin 與 Teece 如何共同解決「品質標準不能妥協」與「市場危機必須快速應變」之間的悖論？（14 min）":"How do Martin and Teece together resolve the paradox between 'quality standards cannot be compromised' and 'market crisis demands rapid response'? (14 min)"}</p>
    </div>
    <div class="tag" style="border-color:rgba(180,83,9,.30);background:rgba(180,83,9,.08);color:var(--t3);">⚡ T3 · 14 min</div>
  </div>
  ${timeTags("t3")}

  <div class="grid2">
    <div class="card">
      <h3 class="cardTitle" style="color:var(--t3)">${zh?"表面悖論（Surface Paradox）":"The Surface Paradox"}</h3>
      <div class="callout orange">
        <p class="p" style="font-size:14px;">
          <strong>${zh?"品質剛性的要求：":"Quality Rigidity Requirement:"}</strong><br/>
          ${zh?"火箭與醫療閥門的精度規格是非談判性的——任何妥協都可能導致認證失效、產品召回，甚至危及人命。":"Precision specs for rocket and medical valves are non-negotiable — any compromise may invalidate certification, trigger product recalls, or endanger lives."}<br/><br/>
          <strong>${zh?"組織彈性的需求：":"Organizational Flexibility Need:"}</strong><br/>
          ${zh?"市場危機要求快速重新部署資源、轉換目標市場、修改商業模式——這些都與「一切按照手冊、不准偏差」的作業文化相衝突。":"Market crisis demands rapid redeployment of resources, market pivoting, business model modification — all conflicting with 'follow the manual, no deviation' operational culture."}</p>
      </div>

    drama_zh:`競爭對手貴船主導的人工心臟「核心心臟（CoreHeart）」臨床試驗第一位患者小西急速惡化死亡。貴船結論：「核心心臟（CoreHeart）本身沒問題，是弟子卷田的初期對應失誤。」——他嫁禍給弟子，試圖繼續推進試驗。<br>同一時間，佃製作所收到通知：佐山製作所（椎名直之）已<em>同時</em>搶走人工心臟瓣膜合約<strong>和</strong>火箭引擎閥門供應合約。「火箭品質」的招牌已被褫奪。交易夥伴連續打來電話取消合作。<br>財前在帝國重工內部政治角力中失脚，失去部長職位。`,

    drama_en:`Ep10 opening: Gaudi passes the PMDA (Pharmaceuticals and Medical Devices Agency) interview and is approved to proceed with large animal experiments. This is the culmination of repeated failures, adjustments, and re-validations by Tachibana, Kano, and Suzuki's technical trio since Ep7 — finally recognized under rigorous regulatory scrutiny.<br>Subsequently, Tsukuda conducts the artificial heart valve blood clot formation test. The readings on the monitor make everyone in the room hold their breath: <em>'Not just clearing the baseline — the blood clot formation rate is even lower than the human body's natural rate.'</em> Tsukuda Kohei looks up: 'We can proceed to clinical trials.'<br>The technical trio exchanges a silent glance in the corner — no cheers, only red-eyed silence.`,
    martin_zh:`<strong>選擇串流的靜默勝利：</strong> PMDA 的認可與血栓測試的突破，不是因為哪一個人下達了正確指令——而是因為立花團隊在「品質不妥協」這個上游脈絡下，被賦予了<em>自主判斷技術路徑</em>的空間。這是 Martin 所說「選擇串流有效運作」的最直接體現。<br>對照核心心臟（CoreHeart）：貴船教授的組織正好相反——弟子卷田掌握了設計問題的資訊，卻沒有空間提出。結果是患者死亡、數據造假。<strong>兩個組織，兩種決策架構，兩種命運。</strong><br>Martin 的銀行出納 Mary 與立花的對比：Mary 保持沉默，銀行錯失她的洞見；立花在 Ep7-8 失敗時曾一度幾近放棄，但最終選擇回到原點重新面對——不是靠個人勇氣，而是因為佃社長設定的品質脈絡給了他判斷的方向。`,
    martin_en:`<strong>The quiet victory of the Choice Cascade:</strong> PMDA's recognition and the blood clot test breakthrough are not the result of any single correct command — they arise because Tachibana's team was given the space to make <em>autonomous technical judgments</em> within the upstream context of 'uncompromising quality.' This is the most direct embodiment of what Martin calls 'the Choice Cascade working effectively.'<br>Compare with CoaHeart: Professor Kisen's organization worked in exactly the opposite way — disciple Makita held information about the design flaw, but had no space to raise it. The result: patient death, data falsification. <strong>Two organizations, two decision architectures, two fates.</strong><br>Tachibana vs. Martin's bank teller Mary: Mary stayed silent and the bank missed her insights; Tachibana wavered and nearly gave up in Ep7-8, but ultimately returned to the starting point — not through personal courage, but because the quality context President Tsukuda set gave him a direction for his judgment.`,
    teece_zh:`<strong>Sensing 微觀基礎的制度化驗證：</strong> Teece 警告：「如果感知、創造和學習功能只留在少數個人的認知特質上，企業將很脆弱。」（Teece, 2007, p.1323）<br>血栓測試的突破說明：立花團隊的技術判斷已從「個人的直覺和技藝」演化為「可量測、可驗證、可向監管機構呈現」的組織能力——這正是 Sensing 微觀基礎制度化的關鍵一步。<br>PMDA 認可也是 Seizing 決策正確性的外部驗證：佃製作所當初進入醫療閥門市場的核心假設（「精密閥門技術可以在醫療領域達到同等嚴格標準」）得到了監管機構的確認。醫療器械市場的競爭邏輯是「最高可信任度」而非「最低成本」——這個框架選擇是對的。<br>🇹🇼 <strong>台灣參照：</strong> 台灣醫材廠商（如心臟支架廠）進入 FDA 認證流程，正面對同樣的挑戰：技術能力必須轉化為可向監管機構呈現的制度化能力，才能在醫療市場真正立足。`,
    teece_en:`<strong>Institutionalization of Sensing microfoundations — externally validated:</strong> Teece warns: 'The enterprise will be vulnerable if the sensing, creative, and learning functions are left to the cognitive traits of a few individuals.' (Teece, 2007, p.1323)<br>The blood clot test breakthrough shows that Tachibana's team's technical judgment has evolved from 'individual intuition and craftsmanship' into 'measurable, verifiable, and regulatory-presentable organizational capability' — the critical step of institutionalizing Sensing microfoundations.<br>PMDA approval is also external validation that the Seizing decision was correct: Tsukuda's core assumption when entering the medical valve market ('precision valve technology can meet equally rigorous standards in the medical domain') has been confirmed by the regulator. The competitive logic of medical devices is 'maximum trustworthiness' not 'lowest cost' — this was the right frame.<br>🇹🇼 <strong>Taiwan reference:</strong> Taiwanese medical device firms (e.g., cardiac stent makers) entering the FDA certification process face the same challenge: technical capability must be transformed into institutionalized capability presentable to regulators before the firm can genuinely establish itself in the medical market.`
  },
  {
    title_zh:"場景四（Ep9-10）：財前失脚的意義——協同專用盟友消失的教訓",
    title_en:"Scene 4 (Ep9-10): The Meaning of Zaizen's Fall — Lesson of a Cospecialized Ally's Disappearance",
    drama_zh:`財前道生在帝國重工內部政治鬥爭中徹底失去實權。這代表：佃製作所長期依賴財前關係維繫的帝國重工合約保障徹底瓦解。<br>此刻佃社長與山崎必須面對一個長期被迴避的問題：「火箭品質」的正當性，從來不只是技術——它同時依賴帝國重工合約的背書與財前的個人信任。這兩者消失，高迪（Gaudi）的品質是否能自己「說話」？<br>答案取決於一村教授的最終選擇：他是否相信佃製作所的技術驗證，願意在手術台上把信任化為行動？`,
    drama_en:`Zaizen Michiharu (Yoshikawa Koji) completely loses real authority in Teikoku's internal power struggle. This means: the guarantee of the Teikoku contract that Tsukuda had long maintained through its relationship with Zaizen completely collapses.<br>Now President Tsukuda and Yamazaki must face a long-avoided question: 'rocket quality' legitimacy never depended only on technology — it simultaneously depended on the endorsement of the Teikoku contract and Zaizen's personal trust. With both gone, can Gaudi's quality 'speak for itself'?<br>The answer depends on Professor Ichimura's final choice: does he believe in Tsukuda's technical validation enough to turn trust into action at the operating table?`,
    martin_zh:`<strong>選擇串流的盲點——未被明確設定的上游前提：</strong> 佃製作所長期把「財前關係」當作理所當然的前提，從未在組織內部以明確的「上游脈絡」形式呈現出來。Martin 說：「每個上游選擇都必須被明確說出、說明理由，才能讓下游的人做出對應的選擇。」<br>財前的失脚，是一個強迫組織回答「我們的競爭基礎究竟是什麼」的時刻——是品質本身，還是品質加上背書？正確答案應該是前者。`,
    martin_en:`<strong>A blind spot in the Choice Cascade — implicit upstream premises never made explicit:</strong> Tsukuda had long treated the 'Zaizen relationship' as a taken-for-granted premise, never presenting it explicitly as an 'upstream context' within the organization. Martin says: 'Every upstream choice must be explicitly stated and its rationale explained for downstream people to make corresponding choices.'<br>Zaizen's fall is a moment that forces the organization to answer 'what is the actual foundation of our competitive position' — is it quality itself, or quality plus endorsement? The correct answer should be the former.`,
    teece_zh:`<strong>協同專用性的脆弱面：</strong> 佃製作所的「火箭品質」品牌是三個協同專用資產的組合：技術能力 × 帝國重工合約背書 × 財前的個人背書。Teece 的協同專用概念強調互相增強的價值，但也帶來了高度依賴性風險——當組合中一個消失，整個組合的市場可信度可能急速崩解。<br>這是為什麼 Teece 強調 Reconfiguring 能力必須包括「定期審視自身資產的協同依賴結構」，而不只是在危機發生後才重配。<br>🇹🇼 <strong>台灣參照：</strong> 台灣許多零組件廠長期依賴單一客戶（如蘋果）的認證背書。一旦客戶轉向或更換供應商，「品質」本身不足以自保——正是協同專用資產過度集中的台灣版本。`,
    teece_en:`<strong>The fragile face of cospecialization:</strong> Tsukuda's 'rocket quality' brand is a combination of three cospecialized assets: technical capability × Teikoku contract endorsement × Zaizen's personal endorsement. Teece's cospecialization concept emphasizes mutually reinforcing value — but it also creates high dependency risk. When one element disappears, the entire combination's market credibility may rapidly collapse.<br>This is why Teece emphasizes that Reconfiguring capability must include 'regularly reviewing the cospecialization dependency structure of one's own assets' — not only redeploying after a crisis occurs.<br>🇹🇼 <strong>Taiwan reference:</strong> Many Taiwanese component makers long relied on a single customer's (e.g., Apple's) certification endorsement. Once the customer pivots or changes suppliers, 'quality' alone is insufficient protection — the Taiwanese version of over-concentrated cospecialized assets.`
  },
  {
    title_zh:"場景五（Ep10終集）：一村教授的選擇——技術誠實的最終勝利",
    title_en:"Scene 5 (Ep10 Finale): Professor Ichimura's Choice — The Final Victory of Technical Honesty",
    drama_zh:`核心心臟（CoreHeart）的數據造假問題逐漸浮出：咲間（倫子）取得核心心臟的實驗數據，委託佃協助分析；然而佃製作所自身的量測機器無法確認數據是否遭到偽造。佃聯繫財前，請求帝國重工的技術支援，終於查明核心心臟的實驗記錄存在系統性造假——不是弟子卷田的操作失誤，而是數據本身的問題。貴船的掩蓋失敗，臨床試驗被主管機關叫停。<br>一村教授在高迪（Gaudi）血栓測試數據遠優於人體基準的事實面前，決定選擇高迪為患者聖人（Hijiri）進行手術。手術成功。<br>立花洋介在工廠外獨自站立，得知手術成功的消息，沉默片刻，轉身走回工廠。<br>佃航平說：「做出好東西。這就是我們能說的全部。剩下的，由時間來說。」`,
    drama_en:`CoaHeart's data falsification gradually surfaces: Sakima (Rinko) obtains CoaHeart experimental data and asks Tsukuda to analyze it. But Tsukuda's own measuring equipment cannot determine whether the data was falsified. Tsukuda contacts Zaizen to request Teikoku's technical support, and ultimately confirms that CoaHeart's experimental records contain systematic falsification — not Makita's operational error, but a problem with the data itself. Kisen's cover-up fails; the regulatory authority halts the clinical trial.<br>Facing the fact that Gaudi's blood clot test results far exceed the human body baseline, Professor Ichimura chooses Gaudi for the surgery on patient Hijiri. The surgery succeeds.<br>Tachibana Yosuke stands alone outside the factory, receives word of the surgery's success, pauses in silence, then turns and walks back inside.<br>Tsukuda Kohei says: 'Make something good. That's everything we can say. The rest, time will tell.'`,
    martin_zh:`<strong>選擇串流終極驗證——結果不是指令的產物，而是選擇的產物：</strong> 手術的成功，是多個層次的選擇疊加在一起的結果：佃社長（設定品質不妥協的上游脈絡）、山崎（判斷時機與咲間合作）、佃再次啟動財前這條管道（尋求帝國重工的技術支援驗證數據）、立花團隊（以三年技術積累換取 PMDA 認可與血栓測試突破）、一村教授（做出醫療判斷選擇高迪）。<br>沒有一個人是「執行命令」——每個人都在各自的脈絡下，做出了屬於自己層次的判斷。<br>Martin 的最終命題：「當工作者感到被賦權，整個組織獲勝。」立花在工廠門口的那個轉身，就是這句話最具體的影像——他轉身不是因為被命令，而是因為他知道自己屬於這裡，並且做出了有意義的選擇。`,
    martin_en:`<strong>Ultimate validation of the Choice Cascade — the result is a product of choices, not commands:</strong> The surgery's success is the stacked result of choices across multiple levels: President Tsukuda (setting the upstream context of uncompromising quality), Yamazaki (judging the timing to partner with Sakima), Tsukuda again activating the Zaizen channel (seeking Teikoku's technical support to validate the data), Tachibana's team (translating three years of technical accumulation into PMDA approval and blood clot test breakthrough), and Professor Ichimura (making the medical judgment to choose Gaudi).<br>No one 'executed a command' — everyone made a judgment appropriate to their own level within their own context.<br>Martin's ultimate proposition: 'When workers are made to feel empowered, the whole organization wins.' Tachibana's turn back toward the factory at that moment is the most concrete image of this sentence — he turns not because he was commanded, but because he knows he belongs there, and has made choices that mattered.`,
    teece_zh:`<strong>動態能力的閉環：高迪（Gaudi）的成功重建了協同專用資產組合：</strong> 手術成功之後，高迪（Gaudi）不再需要帝國重工合約或財前的背書——一村教授的臨床選擇本身成為了新的「醫療市場背書」。這是一個新的協同專用資產組合的誕生：技術能力 × 醫療臨床驗證 × 一村教授的信任。<br>Teece（p.1335）：「持續盈利成長的關鍵是在市場變化時重組和重配資產。」佃製作所完成了從「火箭品質」到「醫療品質」的資產組合重配。<br>🇹🇼 <strong>台灣參照：</strong> 台灣半導體業者面對中國低價競爭，最終靠 AI 晶片先進製程的臨床驗證（客戶認可）重建護城河——同樣是「技術剛性 + 新市場背書」取代舊背書的路徑。`,
    teece_en:`<strong>Dynamic capabilities loop closed — Gaudi's success rebuilds the cospecialized asset combination:</strong> After the surgery succeeds, Gaudi no longer needs the Teikoku contract or Zaizen's endorsement — Professor Ichimura's clinical choice itself becomes the new 'medical market endorsement.' A new cospecialized asset combination is born: technical capability × medical clinical validation × Professor Ichimura's trust.<br>Teece (p.1335): 'Key to sustained profitable growth is the ability to recombine and reconfigure assets as markets change.' Tsukuda has completed the asset portfolio reconfiguration from 'rocket quality' to 'medical quality.'<br>🇹🇼 <strong>Taiwan reference:</strong> Taiwan semiconductor firms facing Chinese low-price competition ultimately rebuilt their moats through AI chip advanced process clinical validation (customer recognition) — the same path of 'technical rigidity + new market endorsement' replacing old endorsements.`
  }
];


function viewC1(){
  const zh=ST.lang==="zh";
  const idx=Math.min(ST.sceneTab||0, SCENES.length-1);
  const sc=SCENES[idx];
  return `
  <div class="sectionHead">
    <div>
      <h1 class="h1" style="color:var(--c1)">${zh?"C1｜劇情分析：下町火箭 S1 Ep9-10（高迪篇終集）雙框架場景解讀":"C1 | Case Analysis: Shitamachi Rocket S1 Ep9-10 (Gaudi Arc Finale) Dual-Lens Scene Reading"}</h1>
      <p class="sub">${zh?"五個 Ep9-10 具體場景，每場景雙框架解析：Martin 選擇串流 × Teece 動態能力（15 min）":"Five specific Ep9-10 scenes, each with dual-lens analysis: Martin Choice Cascade × Teece Dynamic Capabilities (15 min)"}</p>
    </div>
    <div class="tag" style="border-color:rgba(154,52,18,.30);background:rgba(154,52,18,.08);color:var(--c1);">📺 C1 · 15 min</div>
  </div>
  ${timeTags("c1")}

  <div class="sceneFlipper">
    <div class="sceneNav">
      ${SCENES.map((s,i)=>`<div class="sceneTab${i===idx?' active':''}" data-scene="${i}">
        ${zh?`場景${i+1}`:`Scene ${i+1}`}
      </div>`).join("")}
    </div>
    <div class="sceneBody">
      <h3 style="font-weight:900;color:var(--c1);margin:0 0 10px;font-size:17px;">📺 ${zh?sc.title_zh:sc.title_en}</h3>
      <div class="callout gold" style="font-size:14px;line-height:1.65;margin-bottom:12px;">
        <strong>${zh?"劇情：":"Drama:"}</strong><br/>${zh?sc.drama_zh:sc.drama_en}
      </div>
      <div class="sceneFramework">
        <div class="sfBox" style="background:rgba(107,33,168,.06);border:1px solid rgba(107,33,168,.25);">
          <div style="font-weight:900;font-size:13px;color:var(--t1);margin-bottom:8px;">⚖️ Martin (2010) ${zh?"視角":"Lens"}</div>
          <div style="font-size:13px;line-height:1.6;">${zh?sc.martin_zh:sc.martin_en}</div>
        </div>
        <div class="sfBox" style="background:rgba(26,74,139,.06);border:1px solid rgba(26,74,139,.25);">
          <div style="font-weight:900;font-size:13px;color:var(--t2);margin-bottom:8px;">🔄 Teece (2007) ${zh?"視角":"Lens"}</div>
          <div style="font-size:13px;line-height:1.6;">${zh?sc.teece_zh:sc.teece_en}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn" onclick="prevScene()" ${idx===0?'disabled':''}>← ${zh?"上一場景":"Prev"}</button>
        <button class="btn" onclick="nextScene()" ${idx===SCENES.length-1?'disabled':''}>${zh?"下一場景":"Next"} →</button>
      </div>
    </div>
  </div>

  <hr class="sep"/>
  ${pollCard({
    key:"poll_c1",
    title:"Poll B：綜合 Martin 和 Teece——在 Ep9 三條危機同時爆發的情境下，佃製作所最根本的「組織設計失誤」是哪個？",
    title_en:"Poll B: Martin + Teece combined — in Ep9's three simultaneous crises, what is Tsukuda's most fundamental 'organizational design failure'?",
    opts:[
      ["a","長期沒有系統性掃描競爭對手（佐山）和盟友（財前）的動態，Sensing 完全被動","Long-term absence of systematic scanning of competitor (Sayama) and ally (Zaizen) dynamics — Sensing completely reactive"],
      ["b","立花洋介等技術人員缺乏組織授權發表技術判斷，導致關鍵資訊無法上達","Technical staff like Tachibana lack organizational authorization to voice technical judgments, preventing critical information from reaching management"],
      ["c","佃製作所的競爭優勢過度依賴帝國重工合約和財前個人背書這兩個協同專用資產","Tsukuda's competitive advantage overly depends on two cospecialized assets: Teikoku contract and Zaizen's personal endorsement"],
      ["d","佃社長把降低品質規格列為可選項，說明品質標準從未真正被制度化為組織前提","Tsukuda considering lowering quality specs as an option shows quality standards were never truly institutionalized as an organizational premise"]
    ],
    followup:["咲間的「意外出現」說明了什麼？這是能力還是運氣？","如果立花更早說出技術判斷，哪個危機可能提前被化解？"],
    followup_en:["What does Sakima's 'accidental appearance' reveal? Is this capability or luck?","If Tachibana had voiced his technical judgment earlier, which crisis might have been averted sooner?"]
  })}`;
}

//  SECTION S1 — Strategy Memo Synthesis
// ════════════════════════════════════════════
function viewS1(){
  const zh=ST.lang==="zh";
  return `
  <div class="sectionHead">
    <div>
      <h1 class="h1" style="color:var(--s1)">${zh?"S1｜策略備忘錄工作坊：整合兩個框架":"S1 | Strategy Memo Workshop: Integrating Both Frameworks"}</h1>
      <p class="sub">${zh?"備忘錄問題：佃製作所如何在火箭零件的嚴格品質要求與應對市場危機所需的組織彈性之間取得平衡？（10 min）":"Memo question: How can Tsukuda balance the rigid quality requirements of rocket components with the organizational flexibility needed to survive a sudden market crisis? (10 min)"}</p>
    </div>
    <div class="tag" style="border-color:rgba(14,116,144,.30);background:rgba(14,116,144,.08);color:var(--s1);">📝 S1 · 10 min</div>
  </div>
  ${timeTags("s1")}

  <div class="grid2" style="margin-bottom:14px;">
    <div class="card">
      <h3 class="cardTitle" style="color:var(--s1)">${zh?"Memo 三層結構（需要所有三層）":"Memo Three-Part Structure (All Three Required)"}</h3>
      ${[
        ["①",zh?"Martin 診斷層（必填）":"Martin Diagnostic Layer (required)","#6B21A8",
          zh?"指出佃製作所組織設計的哪個「執行陷阱」導致危機管理困難。具體說明：哪個層次的決策被錯誤分配了？選擇串流的哪個步驟被跳過了？":"Identify which 'execution trap' in Tsukuda's organizational design made crisis management difficult. Specify: which level had incorrectly allocated decisions? Which step of the Choice Cascade was skipped?"],
        ["②",zh?"Teece 能力層（必填）":"Teece Capability Layer (required)","#1A4A8B",
          zh?"使用 Sensing / Seizing / Reconfiguring 框架，評估佃製作所哪個動態能力最薄弱，並指出對應的微觀基礎缺失（需引用 Teece 的具體概念，如協同專用性、抗自我蠶食偏見等）":"Using the SSR framework, identify which dynamic capability is weakest and specify the missing microfoundation (must cite specific Teece concepts: cospecialization, anti-cannibalization bias, etc.)"],
        ["③",zh?"整合建議層（必填）":"Integrated Recommendation Layer (required)","#B45309",
          zh?"提出一個同時運用兩個框架的具體建議。說明它如何同時解決「決策層次混亂（Martin）」和「動態能力缺口（Teece）」，以及如何讓品質剛性和組織彈性並存（而不是取捨）":"A concrete recommendation using both frameworks simultaneously. Explain how it resolves both 'decision level confusion (Martin)' AND 'dynamic capability gap (Teece),' and why quality rigidity and organizational flexibility can coexist (not trade off)"]
      ].map(([n,lz,col,desc])=>`<div style="border-left:4px solid ${col};border-radius:0 11px 11px 0;padding:10px 12px;background:${col}08;margin-bottom:8px;">
        <div style="font-weight:900;font-size:13px;color:${col};margin-bottom:4px;">${n} ${lz}</div>
        <div class="sm">${desc}</div>
      </div>`).join("")}
    </div>

    <div class="card">

// ════ CLASSIFIER LOGIC ════
function bindClassify(){
  const chips = document.querySelectorAll("#classify-chips .classifyChip");
  const dcCol = document.getElementById("cc-dc");
  const opCol = document.getElementById("cc-op");
  if(!dcCol||!opCol)return;
  [dcCol,opCol].forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("over");});
    col.addEventListener("dragleave",()=>col.classList.remove("over"));
    col.addEventListener("drop",e=>{
      e.preventDefault();col.classList.remove("over");
      const cid=e.dataTransfer.getData("text");
      const target=col.id==="cc-dc"?"dc":"op";
      ST.classifyDone=ST.classifyDone||{};
      ST.classifyDone[cid]=target;
      save(); showView(ST.view);
    });
  });
  chips.forEach(c=>{
    c.addEventListener("dragstart",e=>{e.dataTransfer.setData("text",c.dataset.cid);});
  });
  document.querySelectorAll(".classifyChip").forEach(c=>{
    c.addEventListener("dragstart",e=>{e.dataTransfer.setData("text",c.dataset.cid);});
    c.addEventListener("click",()=>{
      // on mobile: toggle between columns
      const cid=c.dataset.cid;
      ST.classifyDone=ST.classifyDone||{};
      const cur=ST.classifyDone[cid];
      ST.classifyDone[cid]=cur==="dc"?"op":cur==="op"?null:"dc";
      if(!ST.classifyDone[cid])delete ST.classifyDone[cid];
      save(); showView(ST.view);
    });
  });
}
function checkClassify(){
  const ANSWERS={c1:"dc",c2:"op",c3:"dc",c4:"op",c5:"dc",c6:"dc",c7:"op",c8:"dc"};
  ST.classifyDone=ST.classifyDone||{};
  let correct=0,total=0;
  Object.entries(ANSWERS).forEach(([k,ans])=>{
    if(ST.classifyDone[k]){
      total++;
      ST.classifyDone[k+'-checked']=true;
      if(ST.classifyDone[k]===ans)correct++;
    }
  });
  save(); showView(ST.view);
  const fb=document.getElementById("classify-fb");
  if(fb)fb.textContent=total?`${correct}/${total} ${ST.lang==="zh"?`正確 (動態能力: c1,c3,c5,c6,c8；作業能力: c2,c4,c7)`:`correct (Dynamic: c1,c3,c5,c6,c8; Operational: c2,c4,c7)`}`:
    (ST.lang==="zh"?"請先拖拽一些項目到欄位再檢查":"Please drag some items to columns before checking");
}
function resetClassify(){
  ST.classifyDone={};save();showView(ST.view);
}

const VIEWS = { s0:viewS0, t1:viewT1, t2:viewT2, t3:viewT3, c1:viewC1, s1:viewS1, student:viewStudent };

function showView(v){
  if(!VIEWS[v])return;
  ST.view=v; save();
  document.querySelectorAll(".navItem[data-view]").forEach(el=>{
    el.classList.toggle("active",el.dataset.view===v);
    const seg=el.dataset.view;
    el.className=el.className.replace(/ seg-\S+/g,"");
    if(["s0","t1","t2","t3","c1","s1","student"].includes(seg))el.classList.add("seg-"+seg);
    if(el.dataset.view===v)el.classList.add("active");
  });
  content.innerHTML = VIEWS[v]();
  content.scrollTop=0;
  setTimeout(()=>{
    // polls
    document.querySelectorAll("[data-poll]").forEach(btn=>{
      btn.addEventListener("click",()=>{vote(btn.dataset.poll,btn.dataset.opt);showView(v);});
    });
    // quiz
    document.querySelectorAll("[data-quiz]").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const key=btn.dataset.quiz,idx=+btn.dataset.idx;
        if(ST.quizDone[key])return;
        ST.quizDone[key]=idx+1; save(); showView(v);
      });
    });
    // sliders
    document.querySelectorAll("input[type=range]").forEach(el=>{
      el.addEventListener("input",()=>handleSl(el.id.replace("sl-",""),+el.value));
    });
    setTimeout(()=>{
      document.querySelectorAll("input[type=range]").forEach(el=>el.dispatchEvent(new Event("input")));
    },80);
    // SSR accordion
    if(v==="t2"){
      document.querySelectorAll("[data-ssr]").forEach(el=>{
        el.addEventListener("click",()=>{
          const key=el.dataset.ssr;
          ST.ssrOpen=ST.ssrOpen||{};
          ST.ssrOpen[key]=!ST.ssrOpen[key];
          save(); showView(v);
        });
      });
      bindClassify();
    }
    // Choice Cascade
    if(v==="t1"){
      document.querySelectorAll("[data-cascade]").forEach(el=>{
        el.addEventListener("click",()=>{
          const i=+el.dataset.cascade;
          ST.cascadeOpen=ST.cascadeOpen||{};
          ST.cascadeOpen[i]=!ST.cascadeOpen[i];
          save(); showView(v);
        });
      });
    }
    // Scene tabs
    if(v==="c1"){
      document.querySelectorAll("[data-scene]").forEach(el=>{
        el.addEventListener("click",()=>{ST.sceneTab=+el.dataset.scene;save();showView("c1");});
      });
    }
  },50);
}

    showView(VIEW_ORDER[ni]);showToast(VIEW_ORDER[ni]);
  }
  if(e.key==="l"||e.key==="L"){document.getElementById("btnLang").click();}
  if(e.key==="p"||e.key==="P"){document.getElementById("btnPresenter").click();}
  if(e.key==="r"||e.key==="R"){document.getElementById("btnReset").click();}
  if(e.key==="?"){document.getElementById("btnHelp").click();}
});

// ════ INIT ════
document.body.classList.toggle("presenter",ST.presenter);
if(ST.presenter){document.getElementById("btnPresenter").textContent=ST.lang==="zh"?"結束投影":"Exit Presenter";}
showView(ST.view||"s0");
</script>
